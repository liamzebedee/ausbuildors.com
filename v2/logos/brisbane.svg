<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" fill="none">
  <rect width="128" height="128" rx="24" fill="#1a1a1a"/>
  <!-- Story Bridge silhouette -->
  <g fill="#ffffff">
    <!-- bridge deck -->
    <rect x="14" y="72" width="100" height="5" rx="1"/>
    <!-- left tower -->
    <rect x="28" y="42" width="6" height="35"/>
    <!-- right tower -->
    <rect x="94" y="42" width="6" height="35"/>
    <!-- arch -->
    <path d="M31 45 Q64 14 97 45" stroke="#ffffff" stroke-width="4" fill="none"/>
    <!-- suspension cables -->
    <line x1="40" y1="38" x2="40" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="52" y1="30" x2="52" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="64" y1="26" x2="64" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="76" y1="30" x2="76" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <line x1="88" y1="38" x2="88" y2="72" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <!-- water -->
    <path d="M16 90 Q32 86 48 90 Q64 94 80 90 Q96 86 112 90" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.4"/>
  </g>
</svg>
