<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Members &mdash; Aus Buildooors</title>
  <meta name="description" content="Members and projects in the Aus Buildooors network.">
  <link rel="icon" type="image/png" href="../logo.png?v=1">
  <link rel="stylesheet" href="styles.css?v=1">
</head>
<body>

<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <img src="../logo.png?v=1" alt="Aus Buildooors">
      <span>Aus Buildooors</span>
    </a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">&#9776;</button>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="about.html">About</a>
      <a href="members.html" class="active">Members</a>
      <a href="history.html">History</a>
    </div>
  </div>
</nav>

<main>

  <section class="fade-in" style="padding-top: 2rem;">
    <div class="section-header">
      <div class="label">Directory</div>
      <h1>Members</h1>
    </div>
    <p>Projects and people in our network.</p>
  </section>

  <div class="divider"></div>

  <section class="fade-in">
    <div class="member-list" id="member-list">
      <!-- Generated from src/members.txt -->
    </div>
  </section>

</main>

<script>
fetch('src/members.txt')
  .then(r => r.text())
  .then(text => {
    const el = document.getElementById('member-list');
    el.innerHTML = text.trim().split('\n').filter(l => l.trim()).map(line => {
      const [name, url, logo, area] = line.split(' | ');
      return `<a href="${url}" target="_blank" rel="noopener" class="member-row">
        <img src="assets/logos/${logo}" alt="${name}">
        <span class="member-name">${name}</span>
        <span class="member-area">${area}</span>
      </a>`;
    }).join('');
  });
</script>

<footer>
  <p>Aus Buildooors &mdash; proudly made in Australia since 2022. <a href="https://x.com/ausbuildooors" target="_blank" rel="noopener">@ausbuildooors</a></p>
</footer>

</body>
</html>
